<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מורשת ההעפלה בשביל הים - תרומה מאובטחת</title>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #002244; 
            --secondary: #004488; 
            --accent: #15803d; 
            --highlight: #ffbf00; 
            --bg: #ffffff; 
            --text-main: #1a1a1a; 
        }
        
        body { 
            font-family: 'Heebo', sans-serif; 
            margin: 0; padding: 0; 
            background-color: var(--bg); 
            color: var(--text-main); 
            line-height: 1.8; 
            text-align: right;
            font-size: 22px; 
        }

        .container { max-width: 1000px; margin: 0 auto; padding: 20px; }

        /* סגנון לחלונית הסליקה (Iframe) */
        #payment-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .payment-container {
            background: white;
            padding: 20px;
            border-radius: 15px;
            width: 90%;
            max-width: 500px;
            height: 80vh;
            position: relative;
        }
        .close-payment {
            position: absolute;
            top: -40px; left: 0;
            color: white;
            cursor: pointer;
            font-weight: bold;
        }

        /* כותרת וידאו */
        .hero-video-container {
            position: relative;
            width: 100%;
            height: 45vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
        }
        .hero-video-container iframe {
            position: absolute;
            top: 50%; left: 50%;
            width: 100vw; height: 56.25vw;
            min-height: 100vh; min-width: 177.77vh;
            transform: translate(-50%, -50%);
            z-index: -1;
            pointer-events: none;
        }
        .hero-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 30, 60, 0.5);
            z-index: 1;
        }
        .hero-content { z-index: 2; padding: 20px; }
        .hero-content h1 { font-size: 48px; font-weight: 900; margin: 0; text-shadow: 2px 2px 10px rgba(0,0,0,0.8); }

        .intro-section { padding: 40px; background: white; border-radius: 25px; margin-top: -30px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); position: relative; z-index: 10; }
        
        .heritage-callout {
            background-color: #f0f7ff;
            border-right: 10px solid var(--highlight);
            padding: 25px;
            margin: 35px 0;
            font-size: 24px;
            font-weight: 700;
            color: var(--primary);
        }

        .donation-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin: 40px 0; }
        .donation-card { 
            background: #fff; border: 3px solid #cbd5e1; border-radius: 20px; padding: 30px; text-align: center; transition: 0.3s;
        }
        .donation-card:hover { border-color: var(--highlight); transform: translateY(-5px); }
        .donation-card .amount { font-size: 40px; font-weight: 900; color: var(--primary); }
        .donation-card .level { font-size: 22px; font-weight: 700; color: var(--secondary); margin-bottom: 15px; }
        
        /* הכפתור החדש שמפעיל את ה-API */
        .cta-btn { 
            display: block; background: var(--accent); color: white; padding: 15px; text-decoration: none; border-radius: 12px; font-weight: 700; cursor: pointer; border: none; width: 100%; font-size: 20px;
        }

        @media (max-width: 768px) {
            .hero-content h1 { font-size: 32px; }
        }
    </style>
</head>
<body>

    <div id="payment-modal">
        <div class="payment-container">
            <span class="close-payment" onclick="closePayment()">✖ סגור וחזרה לאתר</span>
            <iframe id="grow-iframe" src="" width="100%" height="100%" frameborder="0"></iframe>
        </div>
    </div>

    <div class="hero-video-container">
        <iframe src="https://www.youtube.com/embed/YOTX5XZQ9jM?autoplay=1&mute=1&loop=1&playlist=YOTX5XZQ9jM&controls=0" frameborder="0"></iframe>
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <h1>הצטרפו לנבחרת <span>ההובלה</span> של המיזם</h1>
        </div>
    </div>

    <div class="container">
        <div class="intro-section">
            
            <div class="heritage-callout">
                חברי קבוצת מורשת יקירים, הנהגה נבחנת בדוגמא אישית. יחד נעלה את רף התרומה ונוביל את המיזם להצלחה!
            </div>

            <div class="donation-grid">
                <div class="donation-card">
                    <div class="amount">₪360</div>
                    <div class="level">נווט בנתיב</div>
                    <p style="font-size: 18px;">שימור סיפורה של ספינה אחת</p>
                    <button class="cta-btn" onclick="openPayment('https://pay.grow.link/XXX-360')">בחירה בסכום זה</button>
                </div>

                <div class="donation-card">
                    <div class="amount">₪720</div>
                    <div class="level">שומר החופים</div>
                    <p style="font-size: 18px;">אחריות על עמדת הנצחה פיזית</p>
                    <button class="cta-btn" onclick="openPayment('https://pay.grow.link/XXX-720')">בחירה בסכום זה</button>
                </div>

                <div class="donation-card" style="border-color: var(--highlight);">
                    <div class="amount">₪1440</div>
                    <div class="level">רב חובל</div>
                    <p style="font-size: 18px;">הנהגת המיזם והשפעה רחבה</p>
                    <button class="cta-btn" onclick="openPayment('https://pay.grow.link/XXX-1440')">בחירה בסכום זה</button>
                </div>
            </div>

            <div style="text-align: center;">
                <a href="#" onclick="openPayment('https://pay.grow.link/XXX-OTHER')" style="color: #64748b;">לתרומת סכום אחר..</a>
            </div>
        </div>
    </div>

    <script>
        // פונקציה לפתיחת חלון התשלום המוטמע
        function openPayment(url) {
            document.getElementById('grow-iframe').src = url;
            document.getElementById('payment-modal').style.display = 'flex';
        }

        // פונקציה לסגירת החלון
        function closePayment() {
            document.getElementById('payment-modal').style.display = 'none';
            document.getElementById('grow-iframe').src = '';
        }
    </script>

</body>
</html>
