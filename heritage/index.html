<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מורשת ההעפלה בשביל הים - נבחרת ההובלה</title>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #002244; 
            --secondary: #004488; 
            --accent: #15803d; 
            --highlight: #ffbf00; 
            --bg: #ffffff; 
            --text-main: #1a1a1a; 
        }
        
        body { 
            font-family: 'Heebo', sans-serif; 
            margin: 0; padding: 0; 
            background-color: var(--bg); 
            color: var(--text-main); 
            line-height: 1.8; 
            text-align: right;
            font-size: 22px; 
        }

        .container { max-width: 1000px; margin: 0 auto; padding: 20px; }
        
        .logos-header { display: flex; justify-content: center; align-items: center; gap: 40px; padding: 20px; background: white; border-bottom: 1px solid #eee; }
        .logos-header img { height: 70px; width: auto; }

        .hero-video-container {
            position: relative;
            width: 100%;
            height: 55vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
        }
        .hero-video-container iframe {
            position: absolute;
            top: 50%; left: 50%;
            width: 100vw; height: 56.25vw;
            min-height: 100vh; min-width: 177.77vh;
            transform: translate(-50%, -50%);
            z-index: -1;
            pointer-events: none;
        }
        .hero-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 30, 60, 0.5);
            z-index: 1;
        }
        .hero-content { z-index: 2; padding: 20px; }
        .hero-content h1 { font-size: 50px; font-weight: 900; margin: 0; text-shadow: 3px 3px 15px rgba(0,0,0,0.9); line-height: 1.2; }
        .hero-content h1 span { color: var(--highlight); }

        .intro-section { padding: 40px; background: white; border-radius: 25px; margin-top: -40px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); position: relative; z-index: 10; }
        
        .heritage-callout {
            background-color: #f0f7ff;
            border-right: 10px solid var(--highlight);
            padding: 25px;
            margin: 35px 0;
            font-size: 24px;
            font-weight: 700;
            color: var(--primary);
            line-height: 1.5;
        }

        .donation-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin: 40px 0; }
        .donation-card { 
            background: #fff; border: 3px solid #cbd5e1; border-radius: 20px; padding: 30px; text-align: center; transition: 0.3s;
            display: flex; flex-direction: column; justify-content: space-between;
        }
        .donation-card:hover { border-color: var(--highlight); transform: translateY(-5px); }
        .donation-card .amount { font-size: 40px; font-weight: 900; color: var(--primary); margin-bottom: 5px; }
        .donation-card .level { font-size: 24px; font-weight: 700; color: var(--secondary); margin-bottom: 15px; }
        
        .cta-btn { 
            display: block; background: var(--accent); color: white; padding: 15px; text-decoration: none; border-radius: 12px; font-weight: 700; font-size: 22px;
        }

        @media (max-width: 768px) {
            .hero-content h1 { font-size: 32px; }
        }
    </style>
</head>
<body>

    <header class="logos-header">
        <img src="קפריסין.png" alt="ארגון מעפילי קפריסין">
        <img src="לוגו שביל הים.jpg" alt="שביל הים">
    </header>

    <div class="hero-video-container">
        <iframe src="https://www.youtube.com/embed/YSSUdB83TYY?autoplay=1&mute=1&loop=1&playlist=YSSUdB83TYY&controls=0&showinfo=0&rel=0" frameborder="0" allow="autoplay; encrypted-media"></iframe>
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <h1>הם <span>בנו</span> את הזיכרון,<br>אנחנו נשמור עליו <span>בחיים</span></h1>
        </div>
    </div>

    <div class="container">
        <div class="intro-section">
            <div class="heritage-callout">
                חברי קבוצת מורשת יקירים, הנהגה נבחנת בדוגמא אישית. כבר 26 חברים הצטרפו והבטיחו את הקמת השלטים הראשונים. בואו נשלים יחד את הנבחרת!
            </div>

            <div class="donation-grid">
                <div class="donation-card">
                    <div class="amount">₪360</div>
                    <div class="level">נווט בנתיב</div>
                    <a href="https://pay.grow.link/9c1e9057bad27814769cf3bebf6556e5-MzI2MTIzOQ" class="cta-btn">בחירה בסכום זה</a>
                </div>
                <div class="donation-card">
                    <div class="amount">₪720</div>
                    <div class="level">שומר החופים</div>
                    <a href="https://pay.grow.link/9c1e9057bad27814769cf3bebf6556e5-MzI2MTIzOQ" class="cta-btn">בחירה בסכום זה</a>
                </div>
                <div class="donation-card" style="border-color: var(--highlight);">
                    <div class="amount">₪1440</div>
                    <div class="level">רב חובל</div>
                    <a href="https://pay.grow.link/9c1e9057bad27814769cf3bebf6556e5-MzI2MTIzOQ" class="cta-btn">בחירה בסכום זה</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
